<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email - Learner</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS (your main.css variables) -->
  <style>
    :root {
      --background-color: #ffffff;
      --default-color: #394450;
      --heading-color: #223a58;
      --accent-color: #136ad5;
      --surface-color: #ffffff;
      --contrast-color: #ffffff;
    }
    body {
      background-color: var(--background-color);
      color: var(--default-color);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .card {
      background-color: var(--surface-color) !important;
      width: 100%;
      max-width: 500px;
    }
    .btn-primary-custom {
      background-color: var(--accent-color) !important;
      color: var(--contrast-color) !important;
      border: none;
      transition: background-color 0.2s;
    }
    .btn-primary-custom:hover {
      background-color: #0f5ac0 !important;
    }
    a {
      color: var(--accent-color);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .alert-info {
      background-color: color-mix(in srgb, var(--accent-color), transparent 95%) !important;
      color: var(--default-color) !important;
      border: none;
    }
  </style>
</head>
<body>
  <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5">
    <div class="text-center mb-4">
      <i class="bi bi-envelope-check display-1" style="color: var(--accent-color);"></i>
      <h2 class="fw-bold mt-4" style="color: var(--heading-color);">Check Your Email</h2>
      <p class="text-muted">We've sent you instructions for setting your password. You should receive it shortly.</p>
    </div>

    <div class="alert alert-info rounded-3 py-3 mb-4" role="alert">
      <i class="bi bi-info-circle me-2" style="color: var(--accent-color);"></i>
      If you don't see the email, check your spam folder or
      <a href="{% url 'password_reset' %}" style="color: var(--accent-color); font-weight: 600;">try again</a>.
    </div>

    <a href="{% url 'home' %}" class="btn btn-primary-custom w-100 py-2 fw-semibold rounded-3">
      Return to Home
    </a>

    <p class="text-center mt-4 mb-0">
      <a href="{% url 'signin' %}" class="text-decoration-none">← Back to Sign In</a>
    </p>
  </div>

  <!-- Bootstrap JS (optional, only if you need interactive components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
